<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nghi Thức Tâm Linh - Trò Chơi Lật Thẻ</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            /* Đã cập nhật: Sử dụng ảnh nền bạn cung cấp */
            background: #0d0714 url('Halloween Background.webp') no-repeat center center fixed;
            background-size: cover;
            color: #ff3333;
            font-family: 'Courier New', Courier, monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(13, 5, 20, 0.7), rgba(0, 0, 0, 0.85));
            z-index: 1;
        }

        #start-screen, #game-container {
            position: relative;
            z-index: 2;
        }

        /* --- MÀN HÌNH BẮT ĐẦU --- */
        #start-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            text-align: center;
            animation: fadeIn 1s ease-in-out;
        }

        #start-screen h1 {
            font-size: 3.8rem;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: #ff8c00; /* Đổi sang màu cam bí ngô cho hợp ảnh nền */
            text-shadow: 0 0 20px #ff4500, 4px 4px 10px #000000;
            animation: pulse 2s infinite alternate;
        }

        .btn-play {
            padding: 18px 60px;
            font-size: 2.2rem;
            font-weight: bold;
            font-family: inherit;
            background: linear-gradient(180deg, #4a1c00, #150500);
            color: #ff8c00;
            border: 3px solid #ff8c00;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 0 20px #ff4500;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .btn-play:hover {
            background: #ff8c00;
            color: #000000;
            box-shadow: 0 0 40px #ff8c00;
            transform: scale(1.08);
        }

        /* --- MÀN HÌNH GAME CHÍNH --- */
        #game-container {
            display: none; 
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 1100px;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h2 {
            font-size: 2.5rem;
            color: #ff8c00;
            text-shadow: 0 0 10px rgba(255, 69, 0, 0.7);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .stats {
            font-size: 1.5rem;
            color: #e0e0e0;
            text-shadow: 1px 1px 3px #000;
        }

        .grid-container {
            display: grid;
            gap: 30px;
            perspective: 1200px;
            width: 100%;
            justify-content: center;
        }

        @media (min-width: 769px) {
            .grid-container {
                grid-template-columns: repeat(4, 170px);
            }
            .card {
                width: 170px;
                height: 240px; 
            }
        }

        @media (max-width: 768px) {
            .grid-container {
                grid-template-columns: repeat(2, 130px);
                gap: 20px;
            }
            .card {
                width: 130px;
                height: 185px;
            }
        }

        .card {
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
        }

        .card:hover {
            box-shadow: 0 0 25px #ff8c00;
            transform: scale(1.04);
        }

        .card.flip {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 4rem;
            border-radius: 12px;
            border: 2px solid #8b4513;
        }

        .card-front {
            background: linear-gradient(135deg, #2b1100, #050000);
            box-shadow: inset 0 0 20px #000000;
        }

        .card-front::after {
            content: '👁️';
            font-size: 2.8rem;
            opacity: 0.6;
            filter: drop-shadow(0 0 8px #ff8c00);
        }

        .card-back {
            background-color: #161616;
            transform: rotateY(180deg);
            box-shadow: inset 0 0 30px #000000;
        }

        .btn-control {
            margin-top: 35px;
            padding: 12px 30px;
            background-color: rgba(40, 15, 0, 0.8);
            color: #ff8c00;
            border: 1px solid #ff8c00;
            font-family: inherit;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 6px;
        }

        .btn-control:hover {
            background-color: #ff8c00;
            color: #000000;
            box-shadow: 0 0 15px #ff8c00;
        }

        #message {
            margin-top: 25px;
            font-size: 1.8rem;
            font-weight: bold;
            color: #00ffcc;
            text-shadow: 0 0 15px #00ffcc;
            height: 40px;
            text-align: center;
        }

        @keyframes pulse {
            0% { transform: scale(1); text-shadow: 0 0 20px #ff4500; }
            100% { transform: scale(1.03); text-shadow: 0 0 35px #ff8c00, 0 0 10px #ff4500; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1>Nghi Thức Bản Ngã</h1>
        <button class="btn-play" onclick="startGame()">CHƠI</button>
    </div>

    <div id="game-container">
        <header>
            <h2>Vòng Lặp Vô Định</h2>
            <div class="stats">Lượt lật bài: <span id="moves">0</span></div>
        </header>

        <main class="grid-container" id="game-board"></main>

        <div id="message"></div>
        <button class="btn-control" onclick="initGame()">Làm mới Nghi Thức (Reset)</button>
    </div>

    <script>
        const startScreen = document.getElementById('start-screen');
        const gameContainer = document.getElementById('game-container');
        const board = document.getElementById('game-board');
        const movesDisplay = document.getElementById('moves');
        const messageDisplay = document.getElementById('message');

        const symbols = ['💀', '💀', '🦇', '🦇', '🕷️', '🕷️', '🎃', '🎃']; // Thay ma bằng bí ngô cho hợp background
        
        let firstCard = null;
        let secondCard = null;
        let lockBoard = false;
        let moves = 0;
        let matches = 0;

        function startGame() {
            startScreen.style.display = 'none';
            gameContainer.style.display = 'flex';
            initGame();
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function initGame() {
            board.innerHTML = '';
            moves = 0;
            matches = 0;
            firstCard = null;
            secondCard = null;
            lockBoard = false;
            movesDisplay.innerText = moves;
            messageDisplay.innerText = '';

            const shuffledSymbols = shuffle([...symbols]);

            shuffledSymbols.forEach(symbol => {
                const cardElement = document.createElement('div');
                cardElement.classList.add('card');
                cardElement.dataset.symbol = symbol;

                cardElement.innerHTML = `
                    <div class="card-face card-front"></div>
                    <div class="card-face card-back">${symbol}</div>
                `;

                cardElement.addEventListener('click', flipCard);
                board.appendChild(cardElement);
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flip');

            if (!firstCard) {
                firstCard = this;
                return;
            }

            secondCard = this;
            moves++;
            movesDisplay.innerText = moves;
            checkMatch();
        }

        function checkMatch() {
            const isMatch = firstCard.dataset.symbol === secondCard.dataset.symbol;

            if (isMatch) {
                disableCards();
                matches++;
                if (matches === symbols.length / 2) {
                    setTimeout(() => {
                        messageDisplay.innerText = "Nghi thức hoàn tất. Bạn đã thoát khỏi vòng lặp!";
                    }, 400);
                }
            } else {
                unflipCards();
            }
        }

        function disableCards() {
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);
            resetBoard();
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flip');
                secondCard.classList.remove('flip');
                resetBoard();
            }, 1000);
        }

        function resetBoard() {
            [firstCard, secondCard, lockBoard] = [null, null, false];
        }
    </script>
</body>
</html>
